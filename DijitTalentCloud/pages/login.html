<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to your DIJIT Talent Cloud account.">
  <title>Log In - DIJIT Talent Cloud</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .auth-layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
    }
    .auth-card { width: 100%; max-width: 440px; }
  </style>
</head>
<body>

  <a href="#login-form" class="skip-link">Skip to login form</a>

  <div class="auth-layout animate-fade-in">
    <div class="card auth-card animate-slide-up">

      <div style="text-align: center; margin-bottom: var(--space-6);">
        <a href="../DijitTalentCloud.html" class="logo" style="justify-content: center; font-size: 1.75rem; margin-bottom: var(--space-3);" aria-label="DIJIT Home">
          <img src="../../assets/images/Dijit_Talent_Cloud_Logo-removebg-preview.png" alt="DIJIT Talent Cloud Logo" style="height: 52px; width: 52px; border-radius: 14px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1);" />
        </a>
        <h1 style="font-size: var(--text-2xl); margin-bottom: var(--space-1);">Welcome Back</h1>
        <p style="color: var(--color-text-secondary); font-size: var(--text-sm);">Enter your credentials to access your account.</p>
      </div>

      <form id="login-form" novalidate aria-label="Log in form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="name@company.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <div class="flex justify-between items-center">
            <label class="form-label" for="password">Password</label>
            <a href="forgot-password.html" style="font-size: var(--text-xs); color: var(--color-primary); text-decoration: none; font-weight: 500;">Forgot Password?</a>
          </div>
          <div class="input-wrapper">
            <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="input-icon password-toggle" data-input="password" aria-label="Show password">
              <i class="ph ph-eye" aria-hidden="true"></i>
            </button>
          </div>
        </div>

        <button type="submit" id="login-btn" class="btn btn-primary btn-lg" style="width: 100%; margin-top: var(--space-4);">
          Log In <i class="ph ph-sign-in" aria-hidden="true"></i>
        </button>
      </form>

      <div style="text-align: center; margin-top: var(--space-6); font-size: var(--text-sm);">
        <span style="color: var(--color-text-secondary);">Don't have an account?</span>
        <a href="signup.html" style="color: var(--color-primary); text-decoration: none; font-weight: 600; margin-left: 4px;">Sign Up Free</a>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/validation.js"></script>
  <script>
    const form = document.getElementById('login-form');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const email    = document.getElementById('email');
      const password = document.getElementById('password');
      let isValid = true;

      [email, password].forEach(i => Validation.clearError(i));

      if (!Validation.isEmail(email.value)) {
        Validation.showError(email, 'Please enter a valid email address.');
        isValid = false;
      }
      if (!Validation.isNotEmpty(password.value)) {
        Validation.showError(password, 'Password is required.');
        isValid = false;
      }

      if (isValid) {
        const btn = document.getElementById('login-btn');
        btn.classList.add('is-loading');
        btn.setAttribute('aria-busy', 'true');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
      }
    });
  </script>
</body>
</html>

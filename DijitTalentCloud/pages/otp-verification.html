<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Verify your email with the OTP sent to your inbox.">
  <title>OTP Verification - DIJIT Talent Cloud</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .auth-layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
    }
    .auth-card { width: 100%; max-width: 440px; text-align: center; }

    .countdown {
      font-variant-numeric: tabular-nums;
      color: var(--color-text-muted);
      font-size: var(--text-sm);
    }
  </style>
</head>
<body>

  <a href="#otp-form" class="skip-link">Skip to verification form</a>

  <div class="auth-layout animate-fade-in">
    <div class="card auth-card animate-slide-up">

      <div style="margin-bottom: var(--space-6);">
        <div class="avatar" style="width: 72px; height: 72px; margin: 0 auto var(--space-4); background: rgba(99,102,241,0.12); color: var(--color-primary);">
          <i class="ph ph-shield-check" style="font-size: 2rem;" aria-hidden="true"></i>
        </div>
        <h1 style="font-size: var(--text-2xl); margin-bottom: var(--space-1);">Verify Your Email</h1>
        <p style="color: var(--color-text-secondary); font-size: var(--text-sm);">
          We've sent a 4-digit code to<br>
          <strong style="color: var(--color-text-primary);">name@company.com</strong>
        </p>
      </div>

      <form id="otp-form" aria-label="OTP verification form">
        <div class="form-group" style="margin-bottom: var(--space-6);">
          <div class="otp-group" role="group" aria-label="Enter the 4-digit verification code">
            <input type="text" class="form-input otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Digit 1" autofocus>
            <input type="text" class="form-input otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Digit 2">
            <input type="text" class="form-input otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Digit 3">
            <input type="text" class="form-input otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Digit 4">
          </div>
        </div>

        <button type="submit" id="verify-btn" class="btn btn-primary btn-lg" style="width: 100%;">
          Verify Account
        </button>
      </form>

      <div style="margin-top: var(--space-6);">
        <p class="countdown" id="countdown" aria-live="polite">Resend code in <strong>00:30</strong></p>
        <button class="btn btn-ghost" id="resend-btn" style="display: none; margin: var(--space-2) auto 0;">
          <i class="ph ph-arrow-counter-clockwise" aria-hidden="true"></i> Resend Code
        </button>
      </div>

      <hr class="divider">

      <a href="login.html" style="color: var(--color-text-secondary); text-decoration: none; font-size: var(--text-sm); display: inline-flex; align-items: center; gap: 4px;">
        <i class="ph ph-arrow-left" aria-hidden="true"></i> Back to Log In
      </a>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/otp.js"></script>
  <script>
    // Countdown timer
    let seconds = 30;
    const countdownEl = document.getElementById('countdown');
    const resendBtn   = document.getElementById('resend-btn');
    const timer = setInterval(() => {
      seconds--;
      const display = `00:${String(seconds).padStart(2, '0')}`;
      countdownEl.innerHTML = `Resend code in <strong>${display}</strong>`;
      if (seconds <= 0) {
        clearInterval(timer);
        countdownEl.style.display = 'none';
        resendBtn.style.display = 'inline-flex';
      }
    }, 1000);

    resendBtn.addEventListener('click', () => {
      seconds = 30;
      countdownEl.style.display = '';
      resendBtn.style.display = 'none';
      // restart timer...
    });

    document.getElementById('otp-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = document.getElementById('verify-btn');
      btn.classList.add('is-loading');
      btn.setAttribute('aria-busy', 'true');
      setTimeout(() => { window.location.href = 'company-profile.html'; }, 800);
    });
  </script>
</body>
</html>

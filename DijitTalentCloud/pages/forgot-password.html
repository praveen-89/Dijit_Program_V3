<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your DIJIT Talent Cloud password.">
  <title>Forgot Password - DIJIT Talent Cloud</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .auth-layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
    }
    .auth-card { width: 100%; max-width: 440px; }

    .success-state { display: none; text-align: center; }
    .success-state.is-visible { display: block; }
    .form-state.is-hidden { display: none; }
  </style>
</head>
<body>

  <a href="#forgot-form" class="skip-link">Skip to password reset form</a>

  <div class="auth-layout animate-fade-in">
    <div class="card auth-card animate-slide-up">

      <!-- Form State -->
      <div class="form-state" id="form-state">
        <div style="margin-bottom: var(--space-6); text-align: center;">
          <div class="avatar" style="width: 72px; height: 72px; margin: 0 auto var(--space-4); background: rgba(99,102,241,0.12); color: var(--color-primary);">
            <i class="ph ph-key" style="font-size: 2rem;" aria-hidden="true"></i>
          </div>
          <h1 style="font-size: var(--text-2xl); margin-bottom: var(--space-1);">Forgot Password?</h1>
          <p style="color: var(--color-text-secondary); font-size: var(--text-sm);">No worries, we'll send you a reset link.</p>
        </div>

        <form id="forgot-form" novalidate aria-label="Password reset form">
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="name@company.com" required autocomplete="email">
          </div>

          <button type="submit" id="reset-btn" class="btn btn-primary btn-lg" style="width: 100%; margin-top: var(--space-2);">
            Send Reset Link <i class="ph ph-paper-plane-tilt" aria-hidden="true"></i>
          </button>
        </form>
      </div>

      <!-- Success State -->
      <div class="success-state" id="success-state" role="status">
        <div class="avatar" style="width: 72px; height: 72px; margin: 0 auto var(--space-4); background: rgba(16,185,129,0.12); color: var(--color-success);">
          <i class="ph ph-envelope-simple" style="font-size: 2rem;" aria-hidden="true"></i>
        </div>
        <h2 style="font-size: var(--text-xl); margin-bottom: var(--space-2);">Check Your Inbox</h2>
        <p style="color: var(--color-text-secondary); font-size: var(--text-sm); margin-bottom: var(--space-6);">
          We've sent a password reset link to<br><strong id="sent-email" style="color: var(--color-text-primary);"></strong>
        </p>
        <a href="login.html" class="btn btn-primary" style="width: 100%;">Back to Log In</a>
      </div>

      <hr class="divider">

      <div style="text-align: center;">
        <a href="login.html" style="color: var(--color-text-secondary); text-decoration: none; font-size: var(--text-sm); display: inline-flex; align-items: center; gap: 4px;">
          <i class="ph ph-arrow-left" aria-hidden="true"></i> Back to Log In
        </a>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/validation.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email');
      Validation.clearError(email);

      if (!Validation.isEmail(email.value)) {
        Validation.showError(email, 'Please enter a valid email address.');
        return;
      }

      const btn = document.getElementById('reset-btn');
      btn.classList.add('is-loading');
      btn.setAttribute('aria-busy', 'true');

      setTimeout(() => {
        document.getElementById('form-state').classList.add('is-hidden');
        document.getElementById('success-state').classList.add('is-visible');
        document.getElementById('sent-email').textContent = email.value;
      }, 800);
    });
  </script>
</body>
</html>
